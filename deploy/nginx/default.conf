server_tokens off;

server {
  listen 8084;
  listen [::]:8084;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  etag off;
  if_modified_since off;

  add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
  add_header Pragma "no-cache" always;
  add_header Expires "0" always;

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok\n";
  }

  location ^~ /you-died/assets/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location ^~ /you-died/sprites/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  location = /you-died/index.html {
    try_files $uri =404;
  }

  location ^~ /you-died/ {
    try_files $uri $uri/ /you-died/index.html;
  }
}
