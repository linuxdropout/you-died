<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- skull -->
  <rect x="4" y="1" width="8" height="2" fill="#e8dcc8"/>
  <rect x="3" y="3" width="10" height="2" fill="#e8dcc8"/>
  <rect x="3" y="5" width="2" height="2" fill="#e8dcc8"/>
  <rect x="7" y="5" width="2" height="2" fill="#e8dcc8"/>
  <rect x="11" y="5" width="2" height="2" fill="#e8dcc8"/>
  <!-- eyes -->
  <rect x="5" y="5" width="2" height="2" fill="#d42020"/>
  <rect x="9" y="5" width="2" height="2" fill="#d42020"/>
  <!-- jaw -->
  <rect x="3" y="7" width="10" height="1" fill="#e8dcc8"/>
  <rect x="4" y="8" width="8" height="1" fill="#e8dcc8"/>
  <rect x="5" y="9" width="6" height="1" fill="#e8dcc8"/>
  <!-- teeth -->
  <rect x="5" y="10" width="2" height="2" fill="#c8b8a0"/>
  <rect x="9" y="10" width="2" height="2" fill="#c8b8a0"/>
  <rect x="7" y="10" width="2" height="1" fill="#c8b8a0"/>
  <!-- blood drip -->
  <rect x="5" y="12" width="1" height="2" fill="#d42020"/>
  <rect x="10" y="12" width="1" height="1" fill="#d42020"/>
  <rect x="7" y="11" width="1" height="2" fill="#d42020"/>
</svg>
